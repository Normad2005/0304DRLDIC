<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jim Yang | Professional Identity</title>
    <meta name="description" content="Personal professional page for Jim Yang.">
    
    <!-- Google Fonts for modern typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;800&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="stripe-bg"></div>
    <div class="cursor-dot" id="cursor-dot"></div>
    
    <main class="container">
        <!-- Hero Section: High Contrast Dark Band -->
        <section class="band dark-band hero-section" id="hero">
            <div class="content-wrapper asym-left">
                <div class="intro-label slide-up">Hello, I am</div>
                <h1 class="name-title slide-up-delay-1">Jim Yang</h1>
                <p class="subtitle slide-up-delay-2">Innovative Thinker & Professional Creator</p>
                <div class="decorative-line slide-up-delay-3"></div>
            </div>
            
            <!-- Abstract decorative elements in background -->
            <div class="abstract-shape shape-1"></div>
            <div class="abstract-shape shape-2"></div>
        </section>

        <!-- Time Section: High Contrast Light Band -->
        <section class="band light-band time-section" id="time">
            <div class="content-wrapper asym-right">
                <h2 class="section-heading slide-in-right">Current Context</h2>
                <div class="time-container">
                    <div class="time-display pulse-subtle" id="clock">
                        00:00:00
                    </div>
                </div>
                <div class="date-display fade-in-delay" id="date">
                    Loading Date...
                </div>
            </div>
            
            <!-- Structural accent lines -->
            <div class="structural-line v-line"></div>
        </section>
        
        <!-- Footer / Contact Section: Dark Band -->
        <section class="band dark-band contact-section" id="contact">
             <div class="content-wrapper center-aligned">
                  <h2 class="section-heading fade-in">Let's Connect</h2>
                  <p class="body-text mb-2">Ready to bring bold ideas to life with a sharp, minimalist approach.</p>
                  <a href="#" class="primary-button scale-hover">Get in Touch</a>
             </div>
        </section>
    </main>
    
    <script src="script.js"></script>
</body>
</html>
